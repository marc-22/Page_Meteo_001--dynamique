<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord Météo Dynamique</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <h1>🌤️ Tableau de Bord Météo</h1>
  </header>

  <nav class="site-nav" aria-label="Navigation principale">
    <a href="#weather-form">Rechercher une ville</a>
  </nav>

  <main>
    <section class="search-section" aria-label="Recherche de ville">
      <form id="weather-form">
        <label for="city-input">Nom de la ville</label>
        <input 
          type="text" 
          id="city-input" 
          name="city" 
          placeholder="Ex: Jacmel"
          autocomplete="off"
        >
        <button type="submit">Rechercher</button>
      </form>
    </section>

    <section class="result-section" aria-label="Résultat météo">
      <div id="loading" class="loading" hidden>
        Chargement...
      </div>

      <div id="weather-card" class="weather-card" hidden>
        
      </div>

      <div id="error-message" class="error-message" hidden></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Projet réalisé dans le cadre du cours LOG3500 — ISTEAH, Été 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
